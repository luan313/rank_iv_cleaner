name: Extrair PvP IVs na Nuvem

# Isso permite que você inicie o script manualmente clicando em um botão no GitHub
on:
  workflow_dispatch: 

jobs:
  rodar-scraper:
    # O GitHub vai nos emprestar uma máquina com a versão mais recente do Ubuntu
    runs-on: ubuntu-latest
    
    # O GitHub Actions tem um limite de 6 horas por execução no plano gratuito.
    # Como nosso script salva o progresso a cada Pokémon, se ele parar, 
    # rodamos de novo e ele continua de onde parou!
    timeout-minutes: 350 

    steps:
      # 1. Baixa o código do seu repositório para a máquina virtual
      - name: Baixar o código (Checkout)
        uses: actions/checkout@v3

      # 2. Instala o Python 3.10
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Instala as bibliotecas que o seu script precisa
      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests selenium webdriver-manager

      # 4. Executa os seus scripts (ajuste o caminho se estiverem dentro da pasta 'core')
      - name: Rodar Scripts de Extração
        run: |
          python get_names/get_names.py
          python get_ivranks/scrapper.py

      # 5. Salva (Commit & Push) o JSON novo gerado de volta no seu repositório
      - name: Salvar JSON no GitHub
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add dados_pvp_ivs.json lista_pokemons_pvpivs.txt
          # Se houver mudanças, ele faz o commit; se não houver, ele ignora sem dar erro
          git commit -m "🤖 Atualização automática do banco de dados PvP IVs" || echo "Nenhuma mudança para commitar"
          git push